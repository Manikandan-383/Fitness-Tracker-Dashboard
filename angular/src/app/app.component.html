<div class="container">
  <div class="card">

    <h2>Joining Confirmation Letter</h2>

    <div class="form-group">
      <label>Candidate Name</label>
      <input
        type="text"
        [(ngModel)]="candidateName"
        name="candidateName"
        placeholder="Enter Candidate Name">
    </div>

    <div class="form-group">
      <label>Date of Joining</label>
      <input
        type="date"
        [(ngModel)]="joiningDate"
        name="joiningDate">
    </div>

    <button
      (click)="generatePDF()"
      [disabled]="!candidateName || !joiningDate">
      Generate PDF
    </button>

  </div>
</div>
